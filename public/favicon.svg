<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#4f46e5"/>
  <!-- Clock circle -->
  <circle cx="32" cy="32" r="18" stroke="#fff" stroke-width="4" fill="none"/>
  <!-- Clock hands -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="40" y2="36" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#fff"/>
  <!-- Small status indicator -->
  <circle cx="48" cy="16" r="6" fill="#22c55e"/>
</svg>
